<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Throne Companion</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{--bg:#07090f;--panel:#101827;--panel2:#151f32;--text:#f4f1e8;--muted:#a8adbb;--gold:#d6a84f;--accent:#7aa2ff;--danger:#ff6b6b;--border:rgba(255,255,255,.1);--crest:'◆';--theme1:#1f2937;--theme2:#0f172a}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 50% -10%,var(--theme1),var(--bg) 46%,#030407);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;}
    body:before{content:var(--crest);position:fixed;inset:auto -20px 70px auto;font-size:230px;line-height:1;color:rgba(255,255,255,.045);z-index:-1;transform:rotate(-10deg);font-family:Georgia,serif}
    .app{max-width:560px;margin:0 auto;min-height:100vh;padding:18px 14px 92px}.top{display:flex;align-items:center;gap:12px;margin:8px 0 18px}.brand{flex:1}.kicker{font-size:11px;letter-spacing:.24em;color:var(--gold);text-transform:uppercase}.title{font-family:Georgia,serif;font-size:30px;font-weight:800;margin-top:2px}.sub{color:var(--muted);font-size:13px;margin-top:3px}.btn{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);border-radius:16px;padding:12px 14px;font-weight:800}.ghost{background:rgba(0,0,0,.18)}
    .grid{display:grid;gap:12px}.factionTile{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:22px;padding:18px;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 15px 40px rgba(0,0,0,.25)}.factionTile:after{content:attr(data-crest);position:absolute;right:12px;top:-16px;font-size:92px;color:rgba(255,255,255,.10);font-family:Georgia,serif}.factionName{font-family:Georgia,serif;font-size:26px;font-weight:900;letter-spacing:.03em}.factionMeta{margin-top:5px;color:rgba(255,255,255,.74);font-size:13px}.pillrow{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}.chip{white-space:nowrap;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);border-radius:999px;padding:10px 13px;font-weight:800;font-size:13px}.chip.active{background:var(--gold);color:#1c1303;border-color:transparent}.search{width:100%;border:1px solid var(--border);background:rgba(0,0,0,.24);color:var(--text);border-radius:18px;padding:14px 16px;font-size:16px;outline:none;margin:0 0 12px}.cardRow{border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border-radius:18px;padding:14px;margin-bottom:10px}.rowTop{display:flex;justify-content:space-between;gap:10px}.rowName{font-weight:900;font-size:16px}.rowCost{color:var(--gold);font-weight:900}.rowMeta{color:var(--muted);font-size:12px;margin-top:4px}.statline{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.stat{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:6px 8px;font-size:12px;color:#ddd}.panel{border:1px solid var(--border);background:rgba(12,18,30,.78);border-radius:22px;padding:16px;margin-bottom:14px;backdrop-filter:blur(12px)}.sectionTitle{font-family:Georgia,serif;color:var(--gold);font-size:19px;margin:0 0 10px}.detailName{font-family:Georgia,serif;font-size:30px;font-weight:900}.statsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.bigStat{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:16px;padding:10px;text-align:center}.bigStat b{display:block;font-size:20px}.bigStat span{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}.ability{border-top:1px solid var(--border);padding:12px 0}.ability:first-child{border-top:0}.ability b{color:#fff}.rulelink{color:var(--gold);font-weight:900;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}.bottomNav{position:fixed;left:0;right:0;bottom:0;background:rgba(5,8,14,.92);border-top:1px solid var(--border);backdrop-filter:blur(18px);display:flex;justify-content:center;padding:9px 12px calc(9px + env(safe-area-inset-bottom))}.navInner{max-width:560px;width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.navBtn{border:0;border-radius:15px;padding:11px 8px;background:transparent;color:var(--muted);font-weight:900}.navBtn.active{background:rgba(214,168,79,.16);color:var(--gold)}.sheetBack{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:5}.sheet{width:100%;max-width:560px;margin:0 auto;background:#0d1422;border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(0,0,0,.45)}.empty{color:var(--muted);text-align:center;padding:26px}.armyItem{display:flex;justify-content:space-between;gap:10px;border-top:1px solid var(--border);padding:10px 0}.addBtn{width:100%;border:1px dashed rgba(214,168,79,.45);color:var(--gold);background:rgba(214,168,79,.08);border-radius:16px;padding:13px;font-weight:900}.small{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
<div id="root" class="app"></div>
<script>
const SOURCES=['stark','lannister','baratheon','targaryen','nightswatch','freefolk','greyjoy','martell','bolton','brotherhood','neutral'].map(f=>`https://raw.githubusercontent.com/Pf2eTools/asoiaf-tmg-data/master/data/en/${f}.json`);
const FACTIONS={stark:{name:'Stark',crest:'🐺',a:'#24384d',b:'#101827'},lannister:{name:'Lannister',crest:'🦁',a:'#5a1720',b:'#15080a'},baratheon:{name:'Baratheon',crest:'🦌',a:'#6a4c12',b:'#171207'},targaryen:{name:'Targaryen',crest:'🐉',a:'#41111a',b:'#09070a'},nightswatch:{name:"Night's Watch",crest:'⚫',a:'#2b3039',b:'#050608'},freefolk:{name:'Free Folk',crest:'🦴',a:'#42505b',b:'#111820'},greyjoy:{name:'Greyjoy',crest:'🦑',a:'#173c3b',b:'#061013'},martell:{name:'Martell',crest:'☀️',a:'#7a3b13',b:'#211007'},bolton:{name:'Bolton',crest:'✖',a:'#522333',b:'#14080d'},brotherhood:{name:'Brotherhood',crest:'🔥',a:'#563716',b:'#130b05'},neutral:{name:'Neutral',crest:'⭐',a:'#3f3524',b:'#12100c'}};
const RULES={Weakened:'When a unit performs an attack, the opponent may spend 1 Weakened token to force the attacker to re-roll any attack dice.',Vulnerable:'When a unit is attacked, the attacker may spend 1 Vulnerable token to force the defender to re-roll any Defense Save dice.',Panicked:'When a unit takes a Panic Test, the opponent may spend 1 Panicked token to force that unit to re-roll any Morale Test dice.',Sundering:'Defenders suffer -1 to their Defense Save rolls against this attack.',Vicious:'Defenders suffer -2 to Panic Test rolls caused by this attack.',Precision:'Each attack die roll of 6 prevents Defense Saves.',"Critical Blow":'Each attack die roll of 6 scores 2 Hits instead of 1.',Order:'An ability that can be used at the timing stated on the card. Each Order is normally once per round unless stated otherwise.',"Panic Test":'Roll 2 dice. If the result is less than the unit’s Morale value, it suffers wounds equal to the difference.',Charge:'A unit makes a Maneuver, then performs a Melee Attack if it contacts an enemy.'};
let state={tab:'cards',cards:[],loading:true,err:'',faction:null,category:'all',q:'',detail:null,rule:null,army:{faction:null,points:40,commander:null,units:[],attachments:[],ncus:[]}};
function normType(t){t=(t||'').toLowerCase(); if(t.includes('unit'))return'unit'; if(t.includes('commander'))return'commander'; if(t.includes('attachment'))return'attachment'; if(t.includes('ncu')||t.includes('non'))return'ncu'; if(t.includes('tactic'))return'tactics'; return t||'other'}
function flatten(obj,type,source){return{...obj,_type:normType(type),_source:source,_factionKey:keyFaction(obj.faction||source),_search:JSON.stringify(obj).toLowerCase()}}
function keyFaction(f){f=(f||'').toString().toLowerCase().replace(/[^a-z]/g,''); if(f.includes('night'))return'nightswatch'; if(f.includes('free'))return'freefolk'; return f}
function cardName(c){return c.name||c.n||c.title||'Unnamed'} function cost(c){return c.cost??c.points??c.c??''}
function move(c){return c.speed??c.move??c.movement??c.stats?.move??''} function def(c){return c.defense??c.defence??c.stats?.defense??c.stats?.defence??''} function morale(c){return c.morale??c.stats?.morale??''} function wounds(c){return c.wounds??c.health??c.stats?.wounds??''}
function abilities(c){let a=c.abilities||c.ability||[]; if(!Array.isArray(a))a=[a]; return a}
function attacks(c){let a=c.attacks||c.attack||[]; if(!Array.isArray(a))a=[a]; return a}
function escape(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function linkRules(text){let out=escape(text); Object.keys(RULES).sort((a,b)=>b.length-a.length).forEach(term=>{out=out.replace(new RegExp(`\\b${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`,'gi'),m=>`<span class="rulelink" data-rule="${term}">${m}</span>`)}); return out}
async function load(){try{let cached=localStorage.getItem('tc_cards_v3'); if(cached){state.cards=JSON.parse(cached);state.loading=false;render()} let all=[]; for(const url of SOURCES){try{const data=await fetch(url).then(r=>r.json()); const source=url.split('/').pop().replace('.json',''); Object.entries(data).forEach(([type,val])=>{if(type.startsWith('_'))return; if(Array.isArray(val)) val.forEach(x=>all.push(flatten(x,type,source)));});}catch(e){console.warn('failed',url,e)}} if(all.length){state.cards=all;localStorage.setItem('tc_cards_v3',JSON.stringify(all));state.loading=false;state.err='';render()} else if(!state.cards.length) throw new Error('No card data loaded.')}catch(e){state.loading=false;state.err=e.message;render()}}
function setTheme(f){let meta=FACTIONS[f]||FACTIONS.stark; document.documentElement.style.setProperty('--crest',`'${meta.crest}'`); document.documentElement.style.setProperty('--theme1',meta.a);document.documentElement.style.setProperty('--theme2',meta.b)}
function header(title,sub='',back=false){return `<div class="top">${back?`<button class="btn ghost" onclick="back()">‹</button>`:''}<div class="brand"><div class="kicker">Throne Companion</div><div class="title">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div></div>`}
function factionCounts(){let m={}; state.cards.forEach(c=>m[c._factionKey]=(m[c._factionKey]||0)+1); return m}
function factionScreen(){const counts=factionCounts(); return header('Choose Faction',`${state.cards.length} cards loaded`)+`<div class="grid">${Object.entries(FACTIONS).map(([k,f])=>`<div class="factionTile" style="--a:${f.a};--b:${f.b}" data-crest="${f.crest}" onclick="chooseFaction('${k}')"><div class="factionName">${f.crest} ${f.name}</div><div class="factionMeta">${counts[k]||0} cards</div></div>`).join('')}</div>`}
function listCards(){let f=FACTIONS[state.faction]; setTheme(state.faction); let cats=[['all','All'],['unit','Units'],['commander','Commanders'],['attachment','Attachments'],['ncu','NCUs'],['tactics','Tactics']]; let q=state.q.toLowerCase(); let arr=state.cards.filter(c=>c._factionKey===state.faction).filter(c=>state.category==='all'||c._type===state.category).filter(c=>!q||c._search.includes(q)||cardName(c).toLowerCase().includes(q)); return header(`${f.crest} ${f.name}`,`${arr.length} cards`,true)+`<input class="search" placeholder="Search ${f.name}..." value="${escape(state.q)}" oninput="state.q=this.value;render()"><div class="pillrow">${cats.map(([id,l])=>`<button class="chip ${state.category===id?'active':''}" onclick="state.category='${id}';render()">${l}</button>`).join('')}</div>${arr.map(c=>cardRow(c,'open')).join('')||'<div class="empty">No cards found.</div>'}`}
function cardRow(c,mode='open'){return `<div class="cardRow" onclick="${mode==='add'?`addToArmy('${c.id||cardName(c)}')`:`openCard('${c.id||cardName(c)}')`}"><div class="rowTop"><div><div class="rowName">${escape(cardName(c))}</div><div class="rowMeta">${escape((FACTIONS[c._factionKey]||{}).name||c.faction||'')} • ${escape(c._type)}</div></div><div class="rowCost">${cost(c)!==''?escape(cost(c))+' pts':''}</div></div><div class="statline">${move(c)?`<span class="stat">Mv ${escape(move(c))}</span>`:''}${def(c)?`<span class="stat">Def ${escape(def(c))}</span>`:''}${morale(c)?`<span class="stat">Mor ${escape(morale(c))}</span>`:''}${wounds(c)?`<span class="stat">W ${escape(wounds(c))}</span>`:''}</div></div>`}
function detail(){let c=state.detail; if(!c)return ''; setTheme(c._factionKey); return header('', '', true)+`<div class="panel"><div class="small">${escape((FACTIONS[c._factionKey]||{}).name||'')} • ${escape(c._type)}</div><div class="detailName">${escape(cardName(c))}</div>${cost(c)!==''?`<div class="sub">${escape(cost(c))} points</div>`:''}</div><div class="panel"><div class="statsGrid"><div class="bigStat"><b>${escape(move(c)||'—')}</b><span>Move</span></div><div class="bigStat"><b>${escape(def(c)||'—')}</b><span>Def</span></div><div class="bigStat"><b>${escape(morale(c)||'—')}</b><span>Morale</span></div><div class="bigStat"><b>${escape(wounds(c)||'—')}</b><span>Wounds</span></div></div></div>${section('Attacks',attacksHtml(c))}${section('Abilities',abilitiesHtml(c))}${section('Keywords',keywordsHtml(c))}`}
function section(t,body){return body?`<div class="panel"><h2 class="sectionTitle">${t}</h2>${body}</div>`:''}
function attacksHtml(c){let a=attacks(c); if(!a.length)return ''; return a.map(x=>`<div class="ability"><b>${escape(x.name||x.n||'Attack')}</b><div class="small">${escape(JSON.stringify(x))}</div></div>`).join('')}
function abilitiesHtml(c){let a=abilities(c); if(!a.length)return ''; return a.map(x=>{let name=x.name||x.n||''; let text=x.text||x.t||x.desc||JSON.stringify(x); return `<div class="ability">${name?`<b>${escape(name)}</b>`:''}<div>${linkRules(text)}</div></div>`}).join('')}
function keywordsHtml(c){let text=JSON.stringify(c); let found=Object.keys(RULES).filter(k=>new RegExp(`\\b${k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\b`,'i').test(text)); return found.map(k=>`<button class="chip" onclick="state.rule='${k}';render()">${k}</button>`).join('')}
function armyScreen(){let a=state.army; if(!a.faction){return header('Army Builder','Choose faction')+`<div class="grid">${Object.entries(FACTIONS).map(([k,f])=>`<div class="factionTile" style="--a:${f.a};--b:${f.b}" data-crest="${f.crest}" onclick="state.army.faction='${k}';setTheme('${k}');render()"><div class="factionName">${f.crest} ${f.name}</div></div>`).join('')}</div>`} setTheme(a.faction); let total=[a.commander,...a.units,...a.attachments,...a.ncus].filter(Boolean).reduce((s,c)=>s+(Number(cost(c))||0),0); return header(`${FACTIONS[a.faction].crest} Army`,`${total} / ${a.points} points`,false)+`<div class="panel"><div class="pillrow"><button class="chip ${a.points===30?'active':''}" onclick="state.army.points=30;render()">30</button><button class="chip ${a.points===40?'active':''}" onclick="state.army.points=40;render()">40</button><button class="chip ${a.points===50?'active':''}" onclick="state.army.points=50;render()">50</button><button class="chip" onclick="state.army={faction:null,points:40,commander:null,units:[],attachments:[],ncus:[]};render()">Reset</button></div></div>${armySection('Commander',a.commander?[a.commander]:[], 'commander')}${armySection('Combat Units',a.units,'unit')}${armySection('Attachments',a.attachments,'attachment')}${armySection('NCUs',a.ncus,'ncu')}${tacticsDeck()}`}
function armySection(title,items,type){return `<div class="panel"><h2 class="sectionTitle">${title}</h2>${items.map((c,i)=>`<div class="armyItem"><span>${escape(cardName(c))}</span><b>${cost(c)||''}</b></div>`).join('')||'<div class="small">None selected.</div>'}<button class="addBtn" onclick="openPicker('${type}')">+ Add ${title.replace('Combat ','').replace('s','')}</button></div>`}
function tacticsDeck(){let f=state.army.faction; let cards=state.cards.filter(c=>c._factionKey===f&&c._type==='tactics'); let commander=state.army.commander; let cmdName=commander?cardName(commander).split(',')[0].toLowerCase():''; let cmd=cards.filter(c=>cmdName&&c._search.includes(cmdName)); let base=cards.filter(c=>!cmd.includes(c)).slice(0,7); return `<div class="panel"><h2 class="sectionTitle">Tactics Deck</h2><div class="small">Baseline faction tactics and commander-linked tactics are shown here. Commander matching will improve as data mapping is refined.</div><div class="ability"><b>Baseline Tactics</b>${base.slice(0,7).map(c=>`<div>${escape(cardName(c))}</div>`).join('')||'<div class="small">No tactics found.</div>'}</div><div class="ability"><b>Commander Tactics</b>${cmd.map(c=>`<div>${escape(cardName(c))}</div>`).join('')||'<div class="small">Select commander / no linked tactics detected.</div>'}</div></div>`}
function picker(type){let f=state.army.faction; let arr=state.cards.filter(c=>c._factionKey===f&&(type==='unit'?c._type==='unit':c._type===type)); return header(`Add ${type}`,FACTIONS[f].name,true)+arr.map(c=>cardRow(c,'add')).join('')}
let pickerType=null;
function render(){let html=''; if(state.loading)html=header('Loading','Fetching card data...')+'<div class="panel">Please wait.</div>'; else if(state.err)html=header('Error',state.err)+'<div class="panel">Check the files and refresh.</div>'; else if(pickerType) html=picker(pickerType); else if(state.detail)html=detail(); else if(state.tab==='army')html=armyScreen(); else html=state.faction?listCards():factionScreen(); html+=nav(); if(state.rule)html+=ruleSheet(state.rule); document.getElementById('root').innerHTML=html; document.querySelectorAll('[data-rule]').forEach(el=>el.onclick=e=>{state.rule=e.target.dataset.rule;render()})}
function nav(){return `<div class="bottomNav"><div class="navInner"><button class="navBtn ${state.tab==='cards'?'active':''}" onclick="state.tab='cards';state.detail=null;pickerType=null;render()">Cards</button><button class="navBtn ${state.tab==='army'?'active':''}" onclick="state.tab='army';state.detail=null;pickerType=null;render()">Army</button><button class="navBtn" onclick="alert('Settings later. Version 1 focus: stats + army builder.')">Settings</button></div></div>`}
function ruleSheet(k){let users=state.cards.filter(c=>c._search.includes(k.toLowerCase())).slice(0,8); return `<div class="sheetBack" onclick="state.rule=null;render()"><div class="sheet" onclick="event.stopPropagation()"><h2 class="sectionTitle">${k}</h2><p>${RULES[k]}</p><div class="ability"><b>Found on</b>${users.map(c=>`<div>${escape(cardName(c))}</div>`).join('')||'<div class="small">No cards found.</div>'}</div><button class="btn" onclick="state.rule=null;render()">Close</button></div></div>`}
function chooseFaction(k){state.faction=k;state.category='all';state.q='';setTheme(k);render()} function back(){if(pickerType){pickerType=null;render();return} if(state.detail){state.detail=null;render();return} if(state.faction&&state.tab==='cards'){state.faction=null;render();return} render()} function openCard(id){state.detail=state.cards.find(c=>(c.id||cardName(c))==id);render()} function openPicker(t){pickerType=t;render()} function addToArmy(id){let c=state.cards.find(x=>(x.id||cardName(x))==id); if(!c)return; if(pickerType==='commander')state.army.commander=c; else if(pickerType==='unit')state.army.units.push(c); else if(pickerType==='attachment')state.army.attachments.push(c); else if(pickerType==='ncu')state.army.ncus.push(c); pickerType=null;render()}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{}); load(); render();
</script>
</body>
</html>
